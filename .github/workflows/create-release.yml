name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.42.0)'
        required: true
      force:
        description: 'Force override existing tag'
        required: false
        default: 'false'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from go.mod
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version using awk
            VERSION=$(grep 'modernc.org/sqlite' go.mod | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} does not exist"
          fi

      - name: Create Tag
        if: steps.check_tag.outputs.exists == 'false' || github.event.inputs.force == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force delete existing tag if force flag is set
          if [ "${{ github.event.inputs.force }}" = "true" ] && git rev-parse --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Force deleting existing tag ${{ steps.version.outputs.version }}"
            git tag -d "${{ steps.version.outputs.version }}"
            if [ -n "$GITHUB_ACTIONS" ]; then
              git push origin --delete "${{ steps.version.outputs.version }}"
            fi
          fi
          
          # Create new tag
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          
          # Push tags in GitHub Actions environment
          if [ -n "$GITHUB_ACTIONS" ]; then
            git push origin "${{ steps.version.outputs.version }}"
            echo "Created and pushed tag ${{ steps.version.outputs.version }}"
          else
            echo "Created tag ${{ steps.version.outputs.version }} (skipping push in local environment)"
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false' || github.event.inputs.force == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release in GitHub Actions environment
          if [ -n "$GITHUB_ACTIONS" ]; then
            # Delete existing release if force flag is set
            if [ "${{ github.event.inputs.force }}" = "true" ]; then
              gh release delete "${{ steps.version.outputs.version }}" --yes || true
            fi
            
            gh release create "${{ steps.version.outputs.version }}" \
              --title "Release ${{ steps.version.outputs.version }}" \
              --notes "Release ${{ steps.version.outputs.version }}"
            echo "Created release ${{ steps.version.outputs.version }}"
          else
            echo "Skipping release creation in local environment"
          fi