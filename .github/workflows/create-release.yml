name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.42.0)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from go.mod
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version correctly from go.mod
            VERSION=$(grep 'modernc.org/sqlite' go.mod | awk '{print $3}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Create and push tag
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Delete existing tag if it exists
          if git rev-parse --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.version }} already exists, deleting..."
            git tag -d "${{ steps.version.outputs.version }}"
            git push origin --delete "${{ steps.version.outputs.version }}"
          fi
          
          # Create and push new tag
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Created and pushed tag ${{ steps.version.outputs.version }}"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if it exists
          gh release delete "${{ steps.version.outputs.version }}" --yes || true
          
          # Create new release
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }}"
          echo "Created release ${{ steps.version.outputs.version }}"