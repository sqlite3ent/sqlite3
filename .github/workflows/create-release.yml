name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.42.0)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from go.mod
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from go.mod - match the exact require line
            VERSION=$(grep '^require modernc.org/sqlite' go.mod | awk '{print $3}')
            echo "Extracted version from go.mod: ${VERSION}"
          fi

          # Debug output
          echo "Version value: '${VERSION}'"
          
          # Validate version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format: ${VERSION}"
            echo "Expected format: v1.42.0"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Final Version: ${VERSION}"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Delete existing tag if it exists
          if git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, deleting..."
            git tag -d "${VERSION}"
            git push origin --delete "${VERSION}" || true
          fi
          
          # Create and push new tag
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"
          echo "Created and pushed tag ${VERSION}"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Delete existing release if it exists
          gh release delete "${VERSION}" --yes || true
          
          # Get the commit message for this version
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          
          # Create detailed release notes
          cat > release_notes.md << EOF
          # Release ${VERSION}

          This release updates the embedded SQLite library from modernc.org/sqlite.

          ## Changes
          - Updated modernc.org/sqlite to ${VERSION}
          - Updated example dependencies
          
          ## Installation
          \`\`\`bash
          go get github.com/sqlite3ent/sqlite3@${VERSION}
          \`\`\`
          
          ## What's Changed
          ${COMMIT_MSG}
          
          Full Changelog: https://github.com/${{ github.repository }}/commits/${VERSION}
          EOF
          
          # Create new release with detailed notes
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --notes-file release_notes.md
          echo "Created release ${VERSION}"