name: Process SQLite Update

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'go.mod'
      - 'go.sum'
    branches: [ main ]

jobs:
  process-update:
    if: |
      github.actor == 'dependabot[bot]' && 
      contains(github.event.pull_request.title, 'modernc.org/sqlite')
    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24

      - name: Get modernc/sqlite version
        id: version
        run: |
          # Extract version correctly from go.mod
          VERSION=$(grep 'modernc.org/sqlite' go.mod | awk '{print $3}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version to use: ${VERSION}"

      - name: Update version information
        run: |
          VERSION=$(echo "${{ steps.version.outputs.version }}" | sed 's/^v//')
          echo "Version to use: ${VERSION}"
          # Skip version.go update as the file was removed in previous versions
          echo "Skipping version.go update (file removed in previous versions)"

      - name: Update example dependencies
        run: |
          # Update the main dependency version
          VERSION=$(echo "${{ steps.version.outputs.version }}" | sed 's/^v//')
          echo "Updating example to version ${VERSION}"
          
          cd example
          # Update both the direct dependency and replace directive
          go get github.com/sqlite3ent/sqlite3@v${VERSION}
          go mod tidy
          cd ..
          
          git add example/go.mod example/go.sum
          if ! git diff --staged --quiet; then
            git commit -m "chore(example): update sqlite3 to v${VERSION}"
            # Push changes in GitHub Actions environment
            if [ -n "$GITHUB_ACTIONS" ]; then
              git push
            else
              echo "Skipping git push in local environment"
            fi
          else
            echo "No changes in example dependencies"
          fi

      - name: Update PR title and body
        uses: actions/github-script@v8
        with:
          script: |
            const version = "${{ steps.version.outputs.version }}";
            const { data: pr } = await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              title: `chore: update modernc/sqlite to ${version}`,
              body: `This PR updates modernc.org/sqlite to ${version}\n\n- [x] Updated go.mod to ${version}\n- [x] Updated example dependencies to ${version}\n\nAuto-generated by GitHub Actions.`
            });